events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Allow larger proof-file uploads (backend caps at 5 MB)
    client_max_body_size 10m;

    # Backend service (compose service name : port)
    upstream backend {
        server backend:5000;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API calls to the backend (frontend uses relative /api)
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy uploaded proof files (served by backend /uploads static)
        location /uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static assets with long cache expiry
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }

        # Fallback to index.html for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
