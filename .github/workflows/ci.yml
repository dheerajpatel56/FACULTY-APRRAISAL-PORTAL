name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend — build + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: faculty_appraisal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/faculty_appraisal
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 8h
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret
      REFRESH_TOKEN_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      EMAIL_DISABLED: 'true'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npm run prisma:generate

      - name: Push schema to test DB
        working-directory: backend
        run: npx prisma db push --schema=src/prisma/schema.prisma --skip-generate

      - name: Seed test DB
        working-directory: backend
        run: npm run seed

      - name: TypeScript build
        working-directory: backend
        run: npm run build

      - name: Run tests
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: npm run build
